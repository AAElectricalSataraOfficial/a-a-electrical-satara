<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family: Arial, sans-serif;
        }

        body{
            background:#f4f4f4;
        }

        header{
            background:#007bff;
            color:white;
            padding:15px 50px;
            display:flex;
            justify-content:space-between;
            align-items:center;
        }

        nav a{
            color:white;
            text-decoration:none;
            margin-left:20px;
            font-weight:bold;
        }

        .contact-container{
            max-width:800px;
            margin:50px auto;
            background:white;
            padding:40px;
            border-radius:10px;
            box-shadow:0 0 10px rgba(0,0,0,0.1);
        }

        .contact-container h1{
            text-align:center;
            color:#007bff;
            margin-bottom:20px;
        }

        .contact-container p{
            text-align:center;
            margin-bottom:30px;
            color:#555;
        }

        .form-group{
            margin-bottom:20px;
        }

        label{
            display:block;
            margin-bottom:5px;
            font-weight:bold;
        }

        input,
        textarea{
            width:100%;
            padding:12px;
            border:1px solid #ccc;
            border-radius:5px;
        }

        textarea{
            resize:vertical;
        }

        button{
            background:#007bff;
            color:white;
            border:none;
            padding:12px 25px;
            border-radius:5px;
            cursor:pointer;
            font-size:16px;
        }

        button:hover{
            background:#0056b3;
        }

        .contact-info{
            margin-top:30px;
            text-align:center;
            color:#333;
        }

        footer{
            background:#222;
            color:white;
            text-align:center;
            padding:15px;
            margin-top:50px;
        }
    </style>
</head>
<body>

<header>
    <h2>My Website</h2>

    <nav>
        <a href="index.html">Home</a>
        <a href="about.html">About</a>
        <a href="review.html">Review</a>
        <a href="contact.html">Contact</a>
    </nav>
</header>

<div class="contact-container">

    <h1>Contact Us</h1>

    <p>Have a question? Send us a message.</p>

    <form>

        <div class="form-group">
            <label>Full Name</label>
            <input type="text" placeholder="Enter your name" required>
        </div>

        <div class="form-group">
            <label>Email Address</label>
            <input type="email" placeholder="Enter your email" required>
        </div>

        <div class="form-group">
            <label>Subject</label>
            <input type="text" placeholder="Enter subject" required>
        </div>

        <div class="form-group">
            <label>Message</label>
            <textarea rows="5" placeholder="Write your message" required></textarea>
        </div>

        <button type="submit">Send Message</button>

    </form>

    <div class="contact-info">
        <h3>Contact Information</h3>
        <p>📧 nitindawadte4@gmail.com</p>
        <p>📞 +91 8482977208</p>
        <p>📍 Satara, Maharashtra, India</p>
    </div>

</div>

<footer>
    <p>&copy; 2026 My Website. All Rights Reserved.</p>
</footer>

</body>
</html>
