<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>A.A. Electrical Satara - Customer Review</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f4f4;
            padding: 30px;
        }

        .container {
            max-width: 600px;
            margin: auto;
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        h2 {
            text-align: center;
            color: #0d6efd;
        }

        label {
            font-weight: bold;
            display: block;
            margin-top: 15px;
        }

        input, textarea, select {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }

        textarea {
            resize: vertical;
        }

        button {
            width: 100%;
            background: #0d6efd;
            color: white;
            border: none;
            padding: 12px;
            margin-top: 20px;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background: #084298;
        }

        .stars {
            font-size: 20px;
            color: orange;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>A.A. Electrical Satara</h2>
    <h3>Customer Review Form</h3>

    <form action="#" method="post">

        <label for="name">Your Name</label>
        <input type="text" id="name" name="name" required>

        <label for="mobile">Mobile Number</label>
        <input type="tel" id="mobile" name="mobile">

        <label for="rating">Rating</label>
        <select id="rating" name="rating" required>
            <option value="">Select Rating</option>
            <option value="5">⭐⭐⭐⭐⭐ Excellent</option>
            <option value="4">⭐⭐⭐⭐ Very Good</option>
            <option value="3">⭐⭐⭐ Good</option>
            <option value="2">⭐⭐ Average</option>
            <option value="1">⭐ Poor</option>
        </select>

        <label for="review">Your Review</label>
        <textarea id="review" name="review" rows="5"
                  placeholder="Write your feedback here..."
                  required></textarea>

        <button type="submit">Submit Review</button>

    </form>
</div>

</body>
</html>
