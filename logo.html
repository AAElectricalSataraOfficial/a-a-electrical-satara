<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A.A. Electrical Satara Logo</title>

<style>
body{
    margin:0;
    padding:0;
    font-family:Arial, sans-serif;
    background:#f4f4f4;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

/* Logo Box */
.logo-box{
    text-align:center;
    background:white;
    padding:40px;
    border-radius:15px;
    box-shadow:0 0 15px rgba(0,0,0,0.2);
}

/* Main Logo Text */
.logo{
    font-size:40px;
    font-weight:bold;
    color:#b700ff;
}

/* Tagline */
.tagline{
    margin-top:10px;
    font-size:16px;
    color:#444;
    letter-spacing:2px;
}

/* Icon Style */
.icon{
    font-size:50px;
    color:#8400ff;
    margin-bottom:10px;
}
</style>
</head>
<body>

<div class="logo-box">

    <div class="icon">⚡</div>

    <div class="logo">
        A.A. Electrical Satara
    </div>

    <div class="tagline">
        SATARA | FAST • SAFE • RELIABLE
    </div>

</div>

</body>
</html>
